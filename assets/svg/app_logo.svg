<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nightfall" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#111633" />
      <stop offset="45%" stop-color="#18224a" />
      <stop offset="100%" stop-color="#0b0f23" />
    </radialGradient>
    <linearGradient id="auroraTrail" x1="15%" y1="85%" x2="85%" y2="15%">
      <stop offset="0%" stop-color="#4df8ff" />
      <stop offset="50%" stop-color="#8ae6ff" />
      <stop offset="100%" stop-color="#ffd79a" />
    </linearGradient>
    <linearGradient id="flare" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5f5bff" stop-opacity="0.0" />
      <stop offset="40%" stop-color="#5f5bff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff9fd6" stop-opacity="0.9" />
    </linearGradient>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Cosmic background -->
  <rect width="512" height="512" rx="120" fill="url(#nightfall)" />

  <!-- Ambient glow arcs -->
  <g opacity="0.65" filter="url(#glowSoft)">
    <path d="M80 356 Q200 420 256 420 Q320 420 432 340" fill="none" stroke="url(#auroraTrail)" stroke-width="44" stroke-linecap="round" />
    <path d="M88 180 Q210 120 280 156 Q356 188 430 140" fill="none" stroke="url(#flare)" stroke-width="36" stroke-linecap="round" />
  </g>

  <!-- Stylized monogram "SA" -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M162 320 C162 360 198 384 244 384 C292 384 328 358 328 320 C328 284 306 270 260 256 C216 242 196 230 196 206 C196 176 224 156 268 156 C310 156 340 174 350 204" stroke="url(#auroraTrail)" stroke-width="32" />
    <path d="M332 350 L360 224 L388 350" stroke="#ffffff" stroke-width="26" />
    <path d="M348 296 L372 296" stroke="#ffffff" stroke-width="18" />
  </g>

  <!-- Sparkles -->
  <g fill="#8ae6ff">
    <circle cx="132" cy="164" r="6" opacity="0.9" />
    <circle cx="384" cy="176" r="4" opacity="0.75" />
    <circle cx="172" cy="392" r="5" opacity="0.8" />
    <circle cx="352" cy="392" r="5" opacity="0.85" />
    <circle cx="256" cy="120" r="4" opacity="0.7" />
  </g>

  <!-- Central pulse -->
  <circle cx="260" cy="244" r="82" fill="url(#flare)" opacity="0.45" />
</svg>

